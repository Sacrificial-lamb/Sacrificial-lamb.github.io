<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>· 致小雪 ·</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align日消息: center;
      font-family: "Noto Serif SC", serif;
      color: #f8f9fa;
      overflow: hidden;
      position: relative;
    }

    /* 粒子背景（轻量 JS 实现） */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 20px;
    }

    .heart-container {
      width: 140px;
      height: 140px;
      animation: heartbeat 1.4s infinite;
      margin-bottom: 30px;
    }

    .heart-svg {
      width: 100%;
      height: 100%;
    }

    .heart-path {
      fill: rgba(255, 82, 140, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      stroke: rgba(255, 255, 255, 0.2);
      stroke-width: 1;
      filter: drop-shadow(0 0 20px rgba(255, 82, 140, 0.4));
    }

    .text {
      font-family: "Zhi Mang Xing", cursive;
      font-size: 28px;
      line-height: 1.4;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      max-width: 300px;
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      14% { transform: scale(1.15); }
      28% { transform: scale(1); }
      42% { transform: scale(1.15); }
      70% { transform: scale(1); }
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .text {
        font-size: 24px;
      }
      .heart-container {
        width: 120px;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  <div class="content">
    <div class="heart-container">
      <svg class="heart-svg" viewBox="0 0 100 100">
        <path class="heart-path" d="M50,20 C65,5 80,10 80,25 C80,40 60,55 50,70 C40,55 20,40 20,25 C20,10 35,5 50,20 Z"/>
      </svg>
    </div>
    <div class="text">To 我的小宇宙<br>余生皆是你 ✨</div>
  </div>

  <!-- 轻量粒子背景 -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 30, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: { value: 0.15, random: true },
        size: { value: 2, random: true },
        line_linked: {
          enable: true,
          distance: 150,
          color: "#ffffff",
          opacity: 0.08,
          width: 1
        },
        move: {
          enable: true,
          speed: 0.8,
          direction: "none",
          random: true,
          straight: false,
          out_mode: "out"
        }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: false },
          onclick: { enable: false }
        }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
