<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>· 星河予你 ·</title>
  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #0a091a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
      position: relative;
      font-family: "Noto Serif SC", serif;
      padding: 0 20px;
    }

    .star-field {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2.5s infinite ease-in-out;
    }

    .hearts-area {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: 30px;
    }

    .main-heart {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 110px;
      height: 110px;
      animation: heartbeat 1.3s infinite;
      z-index: 2;
    }

    .small-heart {
      position: absolute;
      width: 28px;
      height: 28px;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
    }

    .text {
      font-family: "Zhi Mang Xing", cursive;
      font-size: 32px;
      line-height: 1.4;
      color: #fff;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
      letter-spacing: 0.5px;
      text-align: center;
      max-width: 100%;
    }

    @keyframes heartbeat {
      0%, 70% { transform: translate(-50%, -50%) scale(1); }
      14%, 42% { transform: translate(-50%, -50%) scale(1.18); }
      28% { transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @media (max-width: 480px) {
      .text { 
        font-size: 26px; 
        line-height: 1.35;
      }
      .main-heart { width: 95px; height: 95px; }
      .small-heart { width: 24px; height: 24px; }
      .hearts-area { width: 200px; height: 200px; }
    }
  </style>
</head>
<body>
  <div class="star-field" id="starField"></div>

  <div class="hearts-area" id="heartsArea">
    <svg class="main-heart" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff9ec7" />
          <stop offset="50%" stop-color="#ff7eb9" />
          <stop offset="100%" stop-color="#d473d4" />
        </linearGradient>
      </defs>
      <path d="M50,20 C65,5 80,10 80,25 C80,40 60,55 50,70 C40,55 20,40 20,25 C20,10 35,5 50,20 Z"
            fill="url(#heartGradient)"
            stroke="rgba(255,255,255,0.2)"
            stroke-width="0.8"
            style="filter: drop-shadow(0 0 20px rgba(240, 100, 160, 0.6));"
      />
    </svg>
  </div>

  <!-- ✅ 加回 "To 小雪" -->
  <div class="text">To 小雪<br>星河滚烫，你是理想✨</div>

  <script>
    // === 星空 ===
    const starField = document.getElementById('starField');
    let starsHTML = '';
    for (let i = 0; i < 80; i++) {
      const size = Math.random() > 0.85 ? (1.2 + Math.random() * 1.3) : (0.4 + Math.random() * 0.9);
      const left = Math.random() * 100;
      const top = Math.random() * 100;
      const delay = Math.random() * 3;
      starsHTML += `
        <div class="star" 
             style="width:${size}px;height:${size}px;left:${left}%;top:${top}%;animation-delay:${delay}s;"></div>
      `;
    }
    starField.innerHTML = starsHTML;

    // === 萤火虫小爱心 ===
    const heartsArea = document.getElementById('heartsArea');
    const colors = ['#ff8ab8', '#d080e0', '#ffb0c1'];
    const centers = [];
    for (let i = 0; i < 3; i++) {
      const angle = (Math.PI * 2 * i) / 3 + (Math.random() - 0.5) * 0.5;
      const radius = 70 + Math.random() * 40;
      centers.push({
        x: Math.cos(angle) * radius,
        y: Math.sin(angle) * radius,
        color: colors[i]
      });
    }

    centers.forEach(center => {
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 100 100");
      svg.classList.add("small-heart");
      svg.style.fill = center.color;
      heartsArea.appendChild(svg);

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", "M50,20 C65,5 80,10 80,25 C80,40 60,55 50,70 C40,55 20,40 20,25 C20,10 35,5 50,20 Z");
      path.setAttribute("fill", "currentColor");
      svg.appendChild(path);

      function blink() {
        const offsetX = (Math.random() - 0.5) * 40;
        const offsetY = (Math.random() - 0.5) * 40;
        svg.style.left = `calc(50% + ${center.x + offsetX}px)`;
        svg.style.top = `calc(50% + ${center.y + offsetY}px)`;
        svg.style.transform = 'translate(-50%, -50%)';
        svg.style.transition = 'opacity 0.3s ease-out';
        svg.style.opacity = '0.9';

        const stayTime = 800 + Math.random() * 400;
        setTimeout(() => {
          svg.style.transition = 'opacity 0.4s ease-in';
          svg.style.opacity = '0';
          const nextDelay = 1000 + Math.random() * 1000;
          setTimeout(blink, nextDelay);
        }, stayTime);
      }
      setTimeout(blink, Math.random() * 1000);
    });
  </script>
</body>
</html>
