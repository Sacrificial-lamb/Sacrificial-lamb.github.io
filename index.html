<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>· 星河予你 ·</title>
  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #0a091a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
      position: relative;
      font-family: "Noto Serif SC", serif;
      padding: 0 20px;
    }

    .stars { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      pointer-events: none; 
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      /* 关键：最小亮度不低，避免“消失” */
      animation: twinkle var(--duration, 4s) infinite ease-in-out;
    }

    .main-heart-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin-bottom: 30px;
    }

    .main-heart {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      animation: heartbeat 1.3s infinite;
    }

    .text {
      font-family: "Zhi Mang Xing", cursive;
      font-size: 30px;
      line-height: 1.3;
      color: #fff;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
      letter-spacing: 0.5px;
      text-align: center;
      max-width: 100%;
    }

    @keyframes heartbeat {
      0% { transform: translate(-50%, -50%) scale(1); }
      14% { transform: translate(-50%, -50%) scale(1.18); }
      28% { transform: translate(-50%, -50%) scale(1); }
      42% { transform: translate(-50%, -50%) scale(1.18); }
      70% { transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--min-opacity, 0.6); }
      50% { opacity: var(--max-opacity, 1); }
    }

    @media (max-width: 480px) {
      .text { font-size: 26px; }
      .main-heart { width: 100px; height: 100px; }
      .main-heart-container { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>
  <!-- 璀璨但稳定的星空 -->
  <div class="stars" id="stars"></div>

  <!-- 主爱心 -->
  <div class="main-heart-container">
    <svg class="main-heart" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff9ec7" />
          <stop offset="50%" stop-color="#ff7eb9" />
          <stop offset="100%" stop-color="#d473d4" />
        </linearGradient>
      </defs>
      <path d="M50,20 C65,5 80,10 80,25 C80,40 60,55 50,70 C40,55 20,40 20,25 C20,10 35,5 50,20 Z"
            fill="url(#heartGradient)"
            stroke="rgba(255,255,255,0.2)"
            stroke-width="0.8"
            style="filter: drop-shadow(0 0 25px rgba(240, 100, 160, 0.6));"
      />
    </svg>
  </div>

  <!-- 单行文案 -->
  <div class="text">星河滚烫，你是理想✨</div>

  <script>
    // 创建60颗稳定闪烁的星星
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      
      // 少数大星（约10颗），其余为小星
      const isLarge = i < 10;
      const size = isLarge ? (1.2 + Math.random() * 1.3) : (0.4 + Math.random() * 0.9);
      
      // 关键：大星最小 opacity 0.7，小星 0.6，永不“消失”
      const minOpacity = isLarge ? 0.7 : 0.6;
      const maxOpacity = isLarge ? 1.0 : 0.9;

      star.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        --duration: ${3 + Math.random() * 3}s;
        --min-opacity: ${minOpacity};
        --max-opacity: ${maxOpacity};
      `;
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
