<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>❤️ 给最爱的你</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #ffe6f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }
    .heart-svg {
      width: 150px;
      height: 150px;
      animation: heartbeat 1.2s infinite;
    }
    .heart-path {
      fill: #ff4d7a;
      filter: drop-shadow(0 4px 8px rgba(255, 77, 122, 0.3));
    }
    .text {
      margin-top: 30px;
      color: #d4235d;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      padding: 0 20px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    @keyframes heartbeat {
      0% { transform: scale(1); }
      14% { transform: scale(1.2); }
      28% { transform: scale(1); }
      42% { transform: scale(1.2); }
      70% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <svg class="heart-svg" viewBox="0 0 100 100">
    <path class="heart-path" d="M50,20 C65,5 80,10 80,25 C80,40 60,55 50,70 C40,55 20,40 20,25 C20,10 35,5 50,20 Z"/>
  </svg>
  <div class="text">Love You, 宝贝！❤️</div>
</body>
</html>
