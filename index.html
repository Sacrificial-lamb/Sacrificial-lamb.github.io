<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>· 星河予你 ·</title>
  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #090818;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
      position: relative;
      font-family: "Noto Serif SC", serif;
      padding: 0 20px;
    }

    .stars { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration, 3s) infinite ease-in-out;
    }

    .orbit-container {
      position: relative;
      width: 260px;
      height: 260px;
      margin-bottom: 30px;
      transform-style: preserve-3d;
      perspective: 800px;
    }

    .main-heart {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      animation: heartbeat 1.3s infinite;
      z-index: 10;
    }

    .small-heart {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 34px;
      height: 34px;
      transform-style: preserve-3d;
      z-index: 5;
    }

    .text {
      font-family: "Zhi Mang Xing", cursive;
      font-size: 30px;
      line-height: 1.3;
      color: #fff;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
      letter-spacing: 0.5px;
      text-align: center;
      max-width: 100%;
    }

    @keyframes heartbeat {
      0% { transform: translate(-50%, -50%) scale(1); }
      14% { transform: translate(-50%, -50%) scale(1.18); }
      28% { transform: translate(-50%, -50%) scale(1); }
      42% { transform: translate(-50%, -50%) scale(1.18); }
      70% { transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--min-opacity, 0.3); }
      50% { opacity: var(--max-opacity, 1); }
    }

    @media (max-width: 480px) {
      .text { font-size: 26px; }
      .main-heart { width: 85px; height: 85px; }
      .small-heart { width: 28px; height: 28px; }
      .orbit-container { width: 220px; height: 220px; }
    }
  </style>
</head>
<body>
  <!-- 璀璨星空 -->
  <div class="stars" id="stars"></div>

  <!-- 爱心系统 -->
  <div class="orbit-container" id="orbitContainer">
    <!-- 主爱心 -->
    <svg class="main-heart" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff9ec7" />
          <stop offset="50%" stop-color="#ff7eb9" />
          <stop offset="100%" stop-color="#d473d4" />
        </linearGradient>
      </defs>
      <path d="M50,20 C65,5 80,10 80,25 C80,40 60,55 50,70 C40,55 20,40 20,25 C20,10 35,5 50,20 Z"
            fill="url(#heartGradient)"
            stroke="rgba(255,255,255,0.2)"
            stroke-width="0.8"
            style="filter: drop-shadow(0 0 20px rgba(240, 100, 160, 0.6));"
      />
    </svg>
  </div>

  <div class="text">星河滚烫，你是理想✨</div>

  <script>
    // === 创建璀璨星空（80颗，含大亮星）===
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      
      // 大部分小星，少数大亮星
      const isBright = Math.random() > 0.85;
      const size = isBright ? (1.5 + Math.random() * 1.5) : (0.4 + Math.random() * 1.2);
      
      star.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random()*100}%;
        top: ${Math.random()*100}%;
        --duration: ${2 + Math.random()*4}s;
        --min-opacity: ${isBright ? 0.5 : 0.2};
        --max-opacity: ${isBright ? 1 : 0.8};
      `;
      starsContainer.appendChild(star);
    }

    // === 创建3颗带光晕的小爱心（修复版）===
    const container = document.getElementById('orbitContainer');
    const configs = [
      { radius: 90,  duration: 12.6, tilt: 0,    color: '#ff8ab8' },   // 加速30%
      { radius: 110, duration: 16.8, tilt: 30,   color: '#d080e0' },
      { radius: 125, duration: 21,   tilt: -25,  color: '#ffb0c1' }
    ];

    configs.forEach((config, i) => {
      // 创建独立SVG（含滤镜）
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 100 100");
      svg.classList.add("small-heart");

      // 定义发光滤镜
      const filter = document.createElementNS("http://www.w3.org/2000/svg", "filter");
      filter.setAttribute("id", `glow-${i}`);
      filter.setAttribute("x", "-50%");
      filter.setAttribute("y", "-50%");
      filter.setAttribute("width", "200%");
      filter.setAttribute("height", "200%");

      const feGaussianBlur = document.createElementNS("http://www.w3.org/2000/svg", "feGaussianBlur");
      feGaussianBlur.setAttribute("in", "SourceGraphic");
      feGaussianBlur.setAttribute("stdDeviation", "3");
      feGaussianBlur.setAttribute("result", "blur");

      const feMerge = document.createElementNS("http://www.w3.org/2000/svg", "feMerge");
      const feMergeNode1 = document.createElementNS("http://www.w3.org/2000/svg", "feMergeNode");
      feMergeNode1.setAttribute("in", "blur");
      const feMergeNode2 = document.createElementNS("http://www.w3.org/2000/svg", "feMergeNode");
      feMergeNode2.setAttribute("in", "SourceGraphic");

      feMerge.appendChild(feMergeNode1);
      feMerge.appendChild(feMergeNode2);

      filter.appendChild(feGaussianBlur);
      filter.appendChild(feMerge);

      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      defs.appendChild(filter);
      svg.appendChild(defs);

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", "M50,20 C65,5 80,10 80,25 C80,40 60,55 50,70 C40,55 20,40 20,25 C20,10 35,5 50,20 Z");
      path.setAttribute("fill", config.color);
      path.setAttribute("filter", `url(#glow-${i})`);

      svg.appendChild(path);
      container.appendChild(svg);

      // 平均起始角度
      const startAngle = i * 120;

      // 创建动画
      const animName = `orbit3d-${i}`;
      const keyframes = `
        @keyframes ${animName} {
          0% {
            transform: translate(-50%, -50%) rotateX(${config.tilt}deg) rotateZ(${startAngle}deg) translateX(${config.radius}px) rotateZ(${-startAngle}deg) rotateX(${-config.tilt}deg);
            opacity: 0.8;
          }
          25% {
            transform: translate(-50%, -50%) rotateX(${config.tilt}deg) rotateZ(${startAngle + 90}deg) translateX(${config.radius}px) rotateZ(${-startAngle - 90}deg) rotateX(${-config.tilt}deg);
            opacity: 1;
          }
          50% {
            transform: translate(-50%, -50%) rotateX(${config.tilt}deg) rotateZ(${startAngle + 180}deg) translateX(${config.radius}px) rotateZ(${-startAngle - 180}deg) rotateX(${-config.tilt}deg);
            opacity: 0.8;
          }
          75% {
            transform: translate(-50%, -50%) rotateX(${config.tilt}deg) rotateZ(${startAngle + 270}deg) translateX(${config.radius}px) rotateZ(${-startAngle - 270}deg) rotateX(${-config.tilt}deg);
            opacity: 0.6;
          }
          100% {
            transform: translate(-50%, -50%) rotateX(${config.tilt}deg) rotateZ(${startAngle + 360}deg) translateX(${config.radius}px) rotateZ(${-startAngle - 360}deg) rotateX(${-config.tilt}deg);
            opacity: 0.8;
          }
        }
      `;

      const style = document.createElement('style');
      style.textContent = keyframes;
      document.head.appendChild(style);

      svg.style.animation = `${animName} ${config.duration}s infinite linear`;
    });
  </script>
</body>
</html>
