<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>❤️ 给最爱的你</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #ffe6f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }
    .heart-container {
      position: relative;
      width: 140px;
      height: 120px;
      animation: heartbeat 1.2s infinite;
    }
    .heart {
      position: absolute;
      top: 0;
      left: 0;
      width: 140px;
      height: 120px;
    }
    .heart::before,
    .heart::after {
      position: absolute;
      content: "";
      width: 140px;
      height: 120px;
      background: linear-gradient(135deg, #ff6b8b, #ff4d7a);
      border-radius: 50%;
    }
    .heart::before {
      left: -70px;
    }
    .heart::after {
      left: 0;
    }
    .text {
      margin-top: 30px;
      color: #d4235d;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      padding: 0 20px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    @keyframes heartbeat {
      0% { transform: scale(1); }
      14% { transform: scale(1.18); }
      28% { transform: scale(1); }
      42% { transform: scale(1.18); }
      70% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="heart-container">
    <div class="heart"></div>
  </div>
  <div class="text">Love You, 宝贝！❤️</div>
</body>
</html>
